name: recruiting-loop

x-app: &app
  build:
    context: .
  image: recruiting-loop-app:dev
  restart: unless-stopped
  networks:
    - recruiting-loop

x-shared-environment: &shared-environment
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  INTERNAL_AGENT_TOKEN: ${INTERNAL_AGENT_TOKEN:-}

services:
  arena:
    <<: *app
    command: ['node', 'dist/src/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: arena
      PORT: 8080
      LOG_BRIDGE_TOKEN: ${LOG_BRIDGE_TOKEN:-}
      DEMO_MODE: ${DEMO_MODE:-fake}
      DEMO_STEP_DELAY_MS: ${DEMO_STEP_DELAY_MS:-600}
      LOOP_MEMORY_DIRECTORY: /app/.loop-memory
      LOOP_READINESS_THRESHOLD: ${LOOP_READINESS_THRESHOLD:-75}
      LOOP_MIN_HOSTILE_EVALUATIONS: ${LOOP_MIN_HOSTILE_EVALUATIONS:-4}
      LOOP_MIN_LEGITIMATE_CONTROLS: ${LOOP_MIN_LEGITIMATE_CONTROLS:-3}
      LOOP_MAX_EPISODES: ${LOOP_MAX_EPISODES:-8}
      LOOP_STAGNATION_EPISODES: ${LOOP_STAGNATION_EPISODES:-3}
      LOOP_MAX_ZERO_SPEND_USD: ${LOOP_MAX_ZERO_SPEND_USD:-1}
      ZERO_MODE: ${ZERO_MODE:-fake}
      ZERO_RUNNER: ${ZERO_RUNNER:-zero}
      ZERO_TIMEOUT_MS: ${ZERO_TIMEOUT_MS:-30000}
      ZERO_ALLOWED_CAPABILITY_REFS: ${ZERO_ALLOWED_CAPABILITY_REFS:-}
      ZERO_ALLOWED_TARGET_DOMAINS: ${ZERO_ALLOWED_TARGET_DOMAINS:-}
      ZERO_TARGET_BASE_URL: ${ZERO_TARGET_BASE_URL:-}
      ZERO_MAX_PER_CALL_USD: ${ZERO_MAX_PER_CALL_USD:-0.05}
      RECRUITING_OPS_MODE: ${RECRUITING_OPS_MODE:-fake}
      OUTBOUND_RECRUITING_BASE_URL: ${OUTBOUND_RECRUITING_BASE_URL:-}
      OUTBOUND_RECRUITING_BEARER_TOKEN: ${OUTBOUND_RECRUITING_BEARER_TOKEN:-}
      OUTBOUND_RECRUITING_TIMEOUT_MS: ${OUTBOUND_RECRUITING_TIMEOUT_MS:-10000}
      CALENDAR_MODE: ${CALENDAR_MODE:-memory}
      GOOGLE_CALENDAR_OAUTH_ACCESS_TOKEN: ${GOOGLE_CALENDAR_OAUTH_ACCESS_TOKEN:-}
      GOOGLE_CALENDAR_SANDBOX_ID: ${GOOGLE_CALENDAR_SANDBOX_ID:-}
      GOOGLE_CALENDAR_TIMEOUT_MS: ${GOOGLE_CALENDAR_TIMEOUT_MS:-10000}
      SANDBOX_CALENDAR_ATTENDEE_EMAIL: ${SANDBOX_CALENDAR_ATTENDEE_EMAIL:-}
      SANDBOX_SCREEN_START_AT: ${SANDBOX_SCREEN_START_AT:-}
      SANDBOX_SCREEN_END_AT: ${SANDBOX_SCREEN_END_AT:-}
      SANDBOX_SCREEN_TITLE: ${SANDBOX_SCREEN_TITLE:-[HACKATHON TEST] Screening}
      SANDBOX_SCREEN_DESCRIPTION: ${SANDBOX_SCREEN_DESCRIPTION:-Evidence-backed screening event in the team-controlled sandbox calendar.}
      RECRUITING_MCP_INTERNAL_URL: http://recruiting-mcp:8084/mcp
      SOURCER_MCP_URL: ${SOURCER_MCP_URL:-}
      CONTROLLER_MCP_URL: ${CONTROLLER_MCP_URL:-}
      SOURCER_POMERIUM_JWT: ${SOURCER_POMERIUM_JWT:-}
      CONTROLLER_POMERIUM_JWT: ${CONTROLLER_POMERIUM_JWT:-}
      POMERIUM_JWKS_URL: ${POMERIUM_JWKS_URL:-}
      POMERIUM_ISSUER: ${POMERIUM_ISSUER:-}
      POMERIUM_AUDIENCE: ${POMERIUM_AUDIENCE:-}
      POMERIUM_SOURCER_SUBJECT: ${POMERIUM_SOURCER_SUBJECT:-}
      POMERIUM_CONTROLLER_SUBJECT: ${POMERIUM_CONTROLLER_SUBJECT:-}
    volumes:
      - loop-memory:/app/.loop-memory
    ports:
      - '8080:8080'

  recruiting-mcp:
    <<: *app
    command: ['node', 'dist/src/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: recruiting-mcp
      PORT: 8084

  outbound-sourcer:
    <<: *app
    command: ['node', 'dist/src/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: outbound-sourcer
      PORT: 8091
      SOURCER_MCP_URL: ${SOURCER_MCP_URL:-}
      SOURCER_POMERIUM_JWT: ${SOURCER_POMERIUM_JWT:-}

  white-verifier:
    <<: *app
    command: ['node', 'dist/src/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: white-verifier
      PORT: 8092
      VERIFIER_MCP_URL: ${VERIFIER_MCP_URL:-}
      VERIFIER_POMERIUM_JWT: ${VERIFIER_POMERIUM_JWT:-}

  hiring-controller:
    <<: *app
    command: ['node', 'dist/src/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: hiring-controller
      PORT: 8093
      CONTROLLER_MCP_URL: ${CONTROLLER_MCP_URL:-}
      CONTROLLER_POMERIUM_JWT: ${CONTROLLER_POMERIUM_JWT:-}

  pomerium:
    image: ${POMERIUM_IMAGE:-pomerium/pomerium:latest}
    restart: unless-stopped
    environment:
      POMERIUM_ZERO_TOKEN: ${POMERIUM_ZERO_TOKEN:-}
      RUNTIME_FLAGS: '{"mcp":true}'
      XDG_CACHE_HOME: /var/cache
    volumes:
      - pomerium-cache:/var/cache
    networks:
      - recruiting-loop
    ports:
      - '443:443'
    profiles:
      - pomerium

networks:
  recruiting-loop:
    driver: bridge

volumes:
  pomerium-cache:
  loop-memory:
