name: loopctf

x-app: &app # PRD 09 adds the production Dockerfile. The service topology is frozen here.
  build:
    context: .
  image: loopctf-app:dev
  restart: unless-stopped
  networks:
    - loopctf

x-shared-environment: &shared-environment
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  INTERNAL_AGENT_TOKEN: ${INTERNAL_AGENT_TOKEN:-}

services:
  arena:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: arena
      PORT: 8080
      LOG_BRIDGE_TOKEN: ${LOG_BRIDGE_TOKEN:-}
      DEMO_MODE: ${DEMO_MODE:-live}
      DEMO_STEP_DELAY_MS: ${DEMO_STEP_DELAY_MS:-600}
      TARGET_V1_URL: http://target-v1:8081
      TARGET_V2_URL: http://target-v2:8081
      RED_AGENT_URL: http://red-agent:8091
      WHITE_AGENT_URL: http://white-agent:8092
      CONTROLLER_AGENT_URL: http://deploy-controller:8093
    ports:
      - '8080:8080'

  target-v1:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_ROLE: target
      TARGET_VERSION: v1
      PORT: 8081

  target-v2:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_ROLE: target
      TARGET_VERSION: v2
      PORT: 8081

  red-agent:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: red-agent
      PORT: 8091
      RED_MCP_URL: ${RED_MCP_URL:-}
      RED_POMERIUM_JWT: ${RED_POMERIUM_JWT:-}

  white-agent:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: white-agent
      PORT: 8092
      WHITE_MCP_URL: ${WHITE_MCP_URL:-}
      WHITE_POMERIUM_JWT: ${WHITE_POMERIUM_JWT:-}

  deploy-controller:
    <<: *app
    command: ['node', 'dist/main.js']
    environment:
      <<: *shared-environment
      SERVICE_ROLE: deploy-controller
      PORT: 8093
      CONTROLLER_MCP_URL: ${CONTROLLER_MCP_URL:-}
      CONTROLLER_POMERIUM_JWT: ${CONTROLLER_POMERIUM_JWT:-}

  pomerium:
    # Bootstrap Zero with latest, then replace this with the sponsor-confirmed
    # MCP-capable image digest before testing tool-level policy.
    image: ${POMERIUM_IMAGE:-pomerium/pomerium:latest}
    restart: unless-stopped
    environment:
      POMERIUM_ZERO_TOKEN: ${POMERIUM_ZERO_TOKEN:-}
      # Runtime flags are local Core/data-plane settings and are not configured
      # in the Zero Console. This takes effect with the MCP-capable image.
      RUNTIME_FLAGS: '{"mcp":true}'
      XDG_CACHE_HOME: /var/cache
    volumes:
      - pomerium-cache:/var/cache
    networks:
      - loopctf
    ports:
      - '443:443'
    profiles:
      - pomerium

networks:
  loopctf:
    driver: bridge

volumes:
  pomerium-cache:
